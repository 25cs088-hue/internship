<!DOCTYPE html>
<html>
<head>
    <title>She Can Foundation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #6c63ff;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #6c63ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5548e5;
        }

        #result {
            margin-top: 15px;
            text-align: center;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Contact Form</h2>

        <input type="text" placeholder="Name">

        <input type="email" placeholder="Email">

        <textarea placeholder="Message"></textarea>

        <button onclick="showMessage()">Submit</button>

        <p id="result"></p>

    </div>

    <script>
        function showMessage() {
            document.getElementById("result").textContent =
            "Form Submitted Successfully";
        }
    </script>

</body>
</html>
